services:
  # MySQL Database
  plantdb_mysql:
    image: mysql:8.0.44-oraclelinux9
    platform: linux/arm64/v8
    container_name: plantdb_mysql
    profiles: ["system"]
    restart: always
    env_file:
      - env/mysql.env
    ports:
      - "3306:3306"
    volumes:
      - plantdb_mysql_data:/var/lib/mysql
    networks:
      - plantdb_network
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API Server
  plantdb_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantdb_backend
    profiles: ["system"]
    restart: always
    env_file:
      - env/backend.env
    ports:
      - "5000:5000"
    networks:
      - plantdb_network
    depends_on:
      plantdb_mysql:
        condition: service_healthy
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Web Application
  plantdb_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: plantdb_frontend
    profiles: ["system"]
    restart: always
    ports:
      - "3030:80"
    networks:
      - plantdb_network
    depends_on:
      - plantdb_backend
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # MySQL Workbench
  plantdb_mysql_workbench:
    image: linuxserver/mysql-workbench:8.0.44
    container_name: plantdb_mysql_workbench
    profiles: ["system"]
    restart: always
    cap_add:
      - IPC_LOCK
    shm_size: "512m"
    env_file:
      - env/mysql_workbench.env
    ports:
      - "3301:3001"
      - "3300:3000"
    volumes:
      - mysql_workbench_config:/config
    networks:
      - plantdb_network
    depends_on:
      plantdb_mysql:
        condition: service_healthy
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Reverse Proxy (Nginx)
  plantdb_nginx:
    build:
      context: ./nginx/reverse-proxy
      dockerfile: Dockerfile
      args:
        PRIMARY_DOMAIN_NAME: plantdb.lab.io.vn
        API_DOMAIN_NAME: plantdb-api.lab.io.vn
        DB_DOMAIN_NAME: plantdb-db.lab.io.vn
    container_name: plantdb_nginx
    profiles: ["system"]
    restart: always
    ports:
      # Map host ports for the two server names to container ports
      # Bind host port 80 to nginx container port 80 for HTTP (redirects to HTTPS)
      # Bind host port 443 to nginx container port 443 for HTTPS
      - "80:80"
      - "443:443"
    volumes:
      - "/etc/letsencrypt:/etc/nginx/certs/letsencrypt:ro"
      - "/var/www/certbot:/var/www/certbot:ro"
    networks:
      - plantdb_network
    depends_on:
      - plantdb_backend
      - plantdb_frontend
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot Initialization for SSL Certificates
  certbot-init:
    image: certbot/certbot:v4.0.0
    container_name: certbot-init
    profiles: ["certbot-init"]
    command: >
      certonly --webroot -w /var/www/certbot
      --email Tinnt@podsoft.com.vn
      -d plantdb.lab.io.vn
      -d plantdb-api.lab.io.vn
      -d plantdb-db.lab.io.vn
      --rsa-key-size 4096
      --agree-tos
      --staple-ocsp
      --preferred-challenges http
      --no-eff-email
      --non-interactive
      --keep-until-expiring
      --expand
    restart: no
    volumes:
      - "/etc/letsencrypt:/etc/letsencrypt"
      - "/var/www/certbot:/var/www/certbot"
    networks:
      - certbot_network
    depends_on:
      - nginx-certbot-challenges
      # nginx-certbot-challenges:
        # condition: service_healthy

  # Nginx for Certbot Renewal (commented out, can be used for scheduled renewals)
  # certbot-renew:
  #   image: certbot/certbot:v4.0.0
  #   container_name: certbot-renew
  #   profiles: ["certbot-renew"]
  #   command: renew --webroot -w /var/www/certbot --noninteractive
  #   restart: no
  #   volumes:
  #     - "/etc/letsencrypt:/etc/letsencrypt"
  #     - "/var/www/certbot:/var/www/certbot"
  #   networks:
  #     - certbot_network

  # Nginx for Certbot Challenges
  nginx-certbot-challenges:
    image: nginx:1.29.0-alpine3.22
    container_name: nginx-certbot-challenges
    profiles: ["certbot-init"]
    restart: no
    ports:
      - "80:80"
    volumes:
      - "/var/www/certbot:/var/www/certbot:ro"
      - "./nginx/certbot-challenges/default.conf:/etc/nginx/conf.d/default.conf"
      - "./nginx/certbot-challenges/nginx.conf:/etc/nginx/nginx.conf"
    networks:
      - certbot_network

volumes:
  # MySQL database data
  plantdb_mysql_data:
    name: plantdb_mysql_data
    driver: local
  # MySQL Workbench configuration data
  mysql_workbench_config:
    name: mysql_workbench_config
    driver: local

networks:
  # PlantDB internal network 
  plantdb_network:
    name: plantdb_network
    driver: bridge
  # Certbot network for certificate management
  certbot_network:
    name: certbot_network
    driver: bridge